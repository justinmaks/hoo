version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hoo
    main: ./cmd/hoo
    binary: hoo
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X github.com/justinmaks/hoo/internal/cmd.version={{.Version}}
      - -X github.com/justinmaks/hoo/internal/cmd.commit={{.Commit}}
      - -X github.com/justinmaks/hoo/internal/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
